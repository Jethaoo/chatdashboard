<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Chat dashboard for customers and admins.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Multi-chat">
  <link rel="apple-touch-icon" href="assets/chat.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/chat.png"/>

  <title>Multi-chat</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #f7f8fc;
      font-family: Arial, sans-serif;
    }

    #app-loader {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f7f8fc;
      z-index: 9999;
    }

    .loader-card {
      width: min(320px, calc(100vw - 32px));
      text-align: center;
      color: #1f2937;
    }

    .loader-icon {
      width: 56px;
      height: 56px;
      margin: 0 auto 16px;
      display: block;
      object-fit: contain;
    }

    .loader-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .loader-subtitle {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 20px;
    }

    .loader-bar {
      height: 12px;
      margin: 10px auto;
      border-radius: 999px;
      background: #e5e7eb;
      animation: pulse 1.2s ease-in-out infinite alternate;
    }

    .loader-bar:nth-child(1) { width: 100%; }
    .loader-bar:nth-child(2) { width: 78%; animation-delay: 0.15s; }
    .loader-bar:nth-child(3) { width: 56%; animation-delay: 0.3s; }

    .loader-help {
      display: none;
      margin-top: 20px;
      padding: 14px;
      border-radius: 14px;
      background: #ffffff;
      border: 1px solid #dbe3f0;
      text-align: left;
      font-size: 13px;
      color: #4b5563;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
    }

    .loader-help.visible {
      display: block;
    }

    .loader-help strong {
      display: block;
      margin-bottom: 6px;
      color: #111827;
    }

    .loader-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .loader-actions button {
      border: 0;
      border-radius: 999px;
      padding: 10px 14px;
      font: inherit;
      cursor: pointer;
    }

    .loader-actions button.primary {
      background: #2563eb;
      color: white;
    }

    .loader-actions button.secondary {
      background: #e5e7eb;
      color: #111827;
    }

    @keyframes pulse {
      from { opacity: 0.45; }
      to { opacity: 0.85; }
    }
  </style>
</head>
<body>
  <div id="app-loader">
    <div class="loader-card">
      <img class="loader-icon" src="assets/chat.png" alt="Multi-chat">
      <div class="loader-title">Multi-chat</div>
      <div class="loader-subtitle">Starting the dashboard for customers and admins.</div>
      <div class="loader-bar"></div>
      <div class="loader-bar"></div>
      <div class="loader-bar"></div>
      <div id="loader-help" class="loader-help">
        <strong>Still starting up?</strong>
        <div id="loader-help-text">
          The app is taking longer than expected. Try reloading the page.
        </div>
        <div class="loader-actions">
          <button class="primary" type="button" onclick="window.location.reload()">Reload</button>
          <button class="secondary" type="button" onclick="window.location.search = '?v=' + Date.now()">Reload fresh</button>
        </div>
      </div>
    </div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    const loader = document.getElementById('app-loader');
    const loaderTitle = document.querySelector('.loader-title');
    const loaderSubtitle = document.querySelector('.loader-subtitle');
    const loaderHelp = document.getElementById('loader-help');
    const loaderHelpText = document.getElementById('loader-help-text');

    const startupWarningTimer = window.setTimeout(function () {
      if (!loader) return;
      if (loaderTitle) loaderTitle.textContent = 'Startup is taking longer than expected';
      if (loaderSubtitle) {
        loaderSubtitle.textContent =
          'This can happen after a deploy or when the browser is using older cached files.';
      }
      if (loaderHelp) loaderHelp.classList.add('visible');
    }, 12000);

    window.addEventListener('flutter-first-frame', function () {
      window.clearTimeout(startupWarningTimer);
      if (loader) {
        loader.remove();
      }
    });

    window.addEventListener('error', function () {
      if (!loader) return;
      window.clearTimeout(startupWarningTimer);
      if (loaderTitle) loaderTitle.textContent = 'Could not start the app';
      if (loaderSubtitle) {
        loaderSubtitle.textContent =
          'A startup error occurred before the dashboard finished loading.';
      }
      if (loaderHelpText) {
        loaderHelpText.textContent =
          'Try reloading the page. If it still fails, clear the site data or open the app in an incognito window.';
      }
      if (loaderHelp) loaderHelp.classList.add('visible');
    });
  </script>
</body>
</html>
